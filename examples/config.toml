approval_policy = "untrusted"

[features]
codex_hooks = true

[[hooks.PermissionRequest]]
matcher = ".*"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "python -m codex_ble_buddy.cli approve-request --timeout 30 --auto-start-service"
timeout = 30
statusMessage = "Checking approval request"
